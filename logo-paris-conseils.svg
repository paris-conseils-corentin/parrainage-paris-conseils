<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 760" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Paris Conseils — Ingénierie financière et optimisation fiscale">
  <defs>
    <linearGradient id="ringGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3b6fbf" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#5d8cd0" stop-opacity="0.92"/>
      <stop offset="70%"  stop-color="#a8bdde" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e6ecf5" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Anneau elliptique fin (orbite tiltée) — outer ellipse - inner ellipse via even-odd -->
  <g transform="translate(370,320) rotate(-15)">
    <path d="M -300,0
             A 300,112 0 1 1 300,0
             A 300,112 0 1 1 -300,0 Z
             M -270,0
             A 270,86 0 1 0 270,0
             A 270,86 0 1 0 -270,0 Z"
          fill="url(#ringGrad)" fill-rule="evenodd"/>
  </g>

  <!-- PARIS CONSEILS — serif, droit -->
  <text x="450" y="455"
        font-family="'Trajan Pro', Cinzel, Georgia, 'Times New Roman', serif"
        font-size="200" font-weight="500" letter-spacing="2"
        fill="#0a0a0a">PARIS CONSEILS</text>

  <!-- Tagline -->
  <text x="455" y="588"
        font-family="'Trajan Pro', Cinzel, Georgia, 'Times New Roman', serif"
        font-size="60" font-weight="400" letter-spacing="5"
        fill="#1a1a1a">INGÉNIERIE FINANCIÈRE &amp; OPTIMISATION FISCALE</text>
</svg>
