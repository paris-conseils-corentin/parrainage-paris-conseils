<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 760" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Paris Conseils — Ingénierie financière et optimisation fiscale">
  <defs>
    <linearGradient id="pc-ring-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3b6fbf" stop-opacity="1"/>
      <stop offset="38%"  stop-color="#5d8cd0" stop-opacity="0.92"/>
      <stop offset="68%"  stop-color="#a8bdde" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e6ecf5" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Anneau elliptique fin (orbite) — outer ellipse moins inner ellipse via even-odd -->
  <g transform="translate(360,310) rotate(-15)">
    <path d="M -310,0
             A 310,118 0 1 1 310,0
             A 310,118 0 1 1 -310,0 Z
             M -278,0
             A 278,90 0 1 0 278,0
             A 278,90 0 1 0 -278,0 Z"
          fill="url(#pc-ring-grad)" fill-rule="evenodd"/>
  </g>

  <!-- PARIS CONSEILS -->
  <text x="440" y="460"
        font-family="'Trajan Pro', Cinzel, Georgia, 'Times New Roman', serif"
        font-size="205" font-weight="500" letter-spacing="2"
        fill="#0a0a0a">PARIS CONSEILS</text>

  <!-- Tagline -->
  <text x="445" y="595"
        font-family="'Trajan Pro', Cinzel, Georgia, 'Times New Roman', serif"
        font-size="62" font-weight="400" letter-spacing="5"
        fill="#1a1a1a">INGÉNIERIE FINANCIÈRE &amp; OPTIMISATION FISCALE</text>
</svg>
