<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -210 1820 670" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Paris Conseils — Ingénierie financière et optimisation fiscale">
  <defs>
    <linearGradient id="pc-swoosh-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3b6fbf" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#7a9ed6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#cfd9ec" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Anneau bleu (swoosh) qui enserre le C -->
  <g transform="translate(80,160) rotate(-22)">
    <path d="M 0,140
             C 60,-20  720,-60  900,40
             C 720,10  140,40  80,170
             C 70,150  35,150  0,140 Z"
          fill="url(#pc-swoosh-grad)"/>
  </g>

  <!-- PARIS CONSEILS (serif, noir) -->
  <text x="290" y="330"
        font-family="Georgia, 'Trajan Pro', 'Cinzel', 'Times New Roman', serif"
        font-size="170"
        font-weight="400"
        letter-spacing="6"
        fill="#0a0a0a">PARIS CONSEILS</text>

  <!-- Tagline -->
  <text x="295" y="430"
        font-family="Georgia, 'Trajan Pro', 'Cinzel', 'Times New Roman', serif"
        font-size="46"
        font-weight="400"
        letter-spacing="6"
        fill="#1a1a1a">INGÉNIERIE FINANCIÈRE &amp; OPTIMISATION FISCALE</text>
</svg>
